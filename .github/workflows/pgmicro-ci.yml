name: pgmicro CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: 10

concurrency:
  group: pgmicro-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: clippy-
          save-always: true
      - run: cargo clippy --workspace --all-features --all-targets --locked --exclude memory-benchmark -- --deny=warnings

  test-postgres:
    name: Postgres integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: test-pg-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-pg-
          save-always: true
      - name: Postgres integration tests
        run: cargo test --locked -p core_tester integration::postgres
      - name: pgmicro CLI tests
        run: cargo test --locked -p pgmicro
