name: Antithesis nightly

on:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/antithesis.yml
    with:
      duration: ${{ github.event.schedule == '0 0 * * 6' && 1440 || 240 }}
      test_name: ${{ github.event.schedule == '0 0 * * 6' && 'weekend run' || 'scheduled run' }}
    secrets: inherit
