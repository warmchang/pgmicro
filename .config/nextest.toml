[profile.default]
# Exclude memory-benchmark from default test runs — it uses dhat as global
# allocator which conflicts with mimalloc from the turso crate when built
# with --all-features.
default-filter = 'not package(memory-benchmark)'

[profile.loom]
# Filter to only run tests with "loom_" in the name
default-filter = 'test(/loom_/)'
# Loom tests are slow - model checking explores all interleavings
slow-timeout = { period = "120s", terminate-after = 2 }
fail-fast = false
failure-output = "final"
test-threads = 1

[profile.shuttle]
# Filter to only run tests containing "shuttle_" in the name
default-filter = 'test(/shuttle_/)'
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = false
failure-output = "final"
test-threads = 1
